<article class="order-card">
  <div class="order-card-header">
    <div>
      <h2>Pedido #{{ order.id }}</h2>
      <span class="table-label">Mesa {{ order.tableNumber }}</span>
    </div>

    <span class="status-badge" [ngClass]="getStatusClass(order.status)">
      {{ getStatusLabel(order.status) }}
    </span>
  </div>

  <div class="order-meta">
    Criado em {{ order.createdAt | date:'dd/MM/yyyy HH:mm' }}
  </div>

  <div class="items-section">
    <h3>Itens</h3>

    <ul>
      <li *ngFor="let item of order.items">
        <strong>{{ item.menuItem.name }}</strong>
        <span> - Qtd: {{ item.quantity }}</span>
        <span *ngIf="item.notes"> | Obs: {{ item.notes }}</span>
      </li>
    </ul>
  </div>

  <div class="order-actions" *ngIf="canAdvanceStatus(order.status)">
    <button class="action-button" [disabled]="isUpdating" (click)="onAdvanceStatus()">
      {{ isUpdating ? 'Atualizando...' : getNextActionLabel(order.status) }}
    </button>
  </div>
</article>
